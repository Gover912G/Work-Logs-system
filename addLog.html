<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h2>Work Log Management System</h2>
    </header>

    <nav>
      <a href="#">Dashboard</a>
      <a href="addLog.html">Add Log</a>
      <a href="#">View Logs</a>
      <a href="#">Reports</a>
    </nav>

    <div class="container">
      <form>

        <h2>New task</h2>
        <div class="mb-3">
          <label for="date" class="form-label">Date</label>
          <input type="datetime-local" class="form-control" id="date" />
        </div>

        <div class="mb-3">
          <label for="task" class="form-label">Task Performed</label>
          <input type="text" class="form-control" id="task" />
        </div>

        <div class="mb-3">
          <label for="Location" class="form-label">Location</label>
          <input type="text" class="form-control" id="location" />
        </div>

        <div class="mb-3">
          <label for="problem" class="form-label">What wes the Problem</label>
          <input type="text" class="form-control" id="problem" />
        </div>

        <div class="mb-3">
          <label for="challenge" class="form-label">challenge Faced</label>
          <input type="text" class="form-control" id="challenge" />
        </div>

        <div class="mb-3">
          <label for="action" class="form-label">Action Taken</label>
          <input type="text" class="form-control" id="action" />
        </div>

        <div class="mb-3">
          <label for="knowledge" class="form-label">Knowledge Earn</label>
          <input type="text" class="form-control" id="knowledge" />
        </div>
          <label for="status" class="form-label">Status</label>


          <input
            class="form-check-input"
            type="radio"
            name="status"
            id="Completed"
          />
          <label class="form-check-label" for="Completed">
            Completed
          </label>

          <input
            class="form-check-input"
            type="radio"
            name="status"
            id="InProgress"
          />
          <label class="form-check-label" for="InProgress">
            In Progress
          </label>
          
          <input
            class="form-check-input"
            type="radio"
            name="status"
            id="pending"
          />
          <label class="form-check-label" for="pending">
            Pending
          </label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
